name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build macOS app
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install native build tools
        run: brew install autoconf automake libtool opus pkg-config

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            .build/cargo-install
            .build/cargo-target
          key: ${{ runner.os }}-cargo-${{ hashFiles('scripts/shell/build-stt.sh') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: npm ci

      - name: Build unsigned app
        run: npm run build:dir

      - name: Upload app smoke-build artifact
        uses: actions/upload-artifact@v4
        with:
          name: open-memo-macos-dir
          path: dist/mac-arm64/Memo.app
          if-no-files-found: error
